---
kind: Namespace
apiVersion: v1
metadata:
  name: deliverly
  annotations:
    field.cattle.io/projectId: local:p-pb8wd
  labels:
    name: deliverly
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deliverly-core
  namespace: deliverly
  labels:
    app: deliverly-core
spec:
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  replicas: 2
  selector:
    matchLabels:
      app: deliverly-core
  template:
    metadata:
      labels:
        app: deliverly-core
    spec:
      hostAliases:
        - ip: "172.25.0.11"
          hostnames: ["postgres"]
        - ip: "172.25.0.13"
          hostnames: ["kafka"]
      containers:
        - name: deliverly-core
          image: deliverly-core
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ConnectDB_CONNECTION
              value: Host=postgres;Port=5432;Database=deliverly;Username=admin;Password=password
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: KAFKA_GROUP_ID
              value: deliverly-group
            - name: KAFKA_TOPIC_TICKET_CREATE
              value: ticket-create
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          stdin: true
          tty: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: deliverly-core
  namespace: deliverly
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: deliverly-core
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 50
---
apiVersion: v1
kind: Service
metadata:
  name: deliverly-core
  namespace: deliverly
spec:
  selector:
    app: deliverly-core
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30800
  type: NodePort
